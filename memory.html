<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank - Книга памяти</title><script src="https://cdn.tailwindcss.com"></script><script src="lang.js"></script><link href="style.css" rel="stylesheet"></head>
<body class="p-4"><div class="max-w-3xl mx-auto">
<div class="flex flex-wrap justify-between items-center gap-3 mb-6 pb-3 border-b border-gold/30"><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;" data-i18n="memory">Книга памяти</h1><div class="flex gap-2"><div id="lang-switcher" class="flex gap-1"></div><a href="index.html" class="btn-secondary px-4 py-2 rounded-full text-sm" data-i18n="back">← На главную</a></div></div>
<div class="glass p-6 mb-6"><h2 class="text-xl font-bold mb-3" data-i18n="add_memory">Добавить запись</h2><input type="text" id="memoryName" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2" data-i18n-placeholder="memory_name"><input type="text" id="memoryWallet" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2" data-i18n-placeholder="wallet_placeholder"><textarea id="memoryText" rows="2" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2" data-i18n-placeholder="memory_text"></textarea><button id="addMemoryBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="add_btn">Добавить в Книгу памяти</button></div>
<div class="glass p-6"><h2 class="text-xl font-bold mb-3" data-i18n="eternal_memory">🙏 Вечная память</h2><div id="memoryList"></div></div>
</div>
<script>let memories=JSON.parse(localStorage.getItem('memories')||'[{"name":"Иван Петров","from":"Анна","text":"Царствие Небесное","date":"2025-05-18"}]');function render(){let container=document.getElementById('memoryList');if(memories.length===0){container.innerHTML='<div class="opacity-60 text-center" data-i18n="no_memories">Пока нет записей</div>';return;}container.innerHTML=memories.map(m=>`<div class="mb-3 p-3 rounded bg-black/30 border border-gold/30"><div class="font-bold">${m.name}</div><div>${m.text}</div><div class="text-xs opacity-60">${translations[currentLang]?.from||'От'} ${m.from}, ${m.date}</div></div>`).join('');}
document.getElementById('addMemoryBtn').onclick=()=>{let name=document.getElementById('memoryName').value.trim();let wallet=document.getElementById('memoryWallet').value.trim();let text=document.getElementById('memoryText').value.trim();if(!name||!text)return;memories.unshift({name,from:wallet.slice(0,8)||'Anonymous',text,date:new Date().toISOString().slice(0,10)});localStorage.setItem('memories',JSON.stringify(memories));render();document.getElementById('memoryName').value='';document.getElementById('memoryText').value='';alert(translations[currentLang]?.saved||'Запись добавлена');};render();</script></body></html>
