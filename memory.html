<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank - Memory Book</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;font-family:'Inter',sans-serif;}.glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border:1px solid rgba(197,160,89,0.3);border-radius:24px;}.btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1510;font-weight:600;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;text-align:center;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6 pb-3 border-b border-gold/30"><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;">📖 Memory Book</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back to Home</a></div>
<div class="glass p-6 mb-6"><h2 class="text-xl font-bold mb-3">Add entry</h2><input type="text" id="memoryName" placeholder="Name of departed" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"><input type="text" id="memoryWallet" placeholder="Your wallet (for contact)" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"><textarea id="memoryText" rows="2" placeholder="Prayer / message" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"></textarea><button id="addMemoryBtn" class="btn-primary w-full py-2 rounded-full">Add to Memory Book</button></div>
<div class="glass p-6"><h2 class="text-xl font-bold mb-3">🙏 Eternal Memory</h2><div id="memoryList"></div></div>
</div>
<script>let memories=JSON.parse(localStorage.getItem('memories')||'[{"name":"John","from":"Anna","text":"Eternal rest","date":"2025-05-18"}]');function render(){let container=document.getElementById('memoryList');if(memories.length===0){container.innerHTML='<div class="opacity-60 text-center">No entries yet</div>';return;}container.innerHTML=memories.map(m=>`<div class="mb-3 p-3 rounded bg-black/30 border border-gold/30"><div class="font-bold">${m.name}</div><div>${m.text}</div><div class="text-xs opacity-60">From ${m.from}, ${m.date}</div></div>`).join('');}
document.getElementById('addMemoryBtn').onclick=()=>{let name=document.getElementById('memoryName').value.trim();let wallet=document.getElementById('memoryWallet').value.trim();let text=document.getElementById('memoryText').value.trim();if(!name||!text)return;memories.unshift({name,from:wallet.slice(0,8)||'Anonymous',text,date:new Date().toISOString().slice(0,10)});localStorage.setItem('memories',JSON.stringify(memories));render();document.getElementById('memoryName').value='';document.getElementById('memoryText').value='';alert('Entry added to Memory Book');};render();</script></body></html>
