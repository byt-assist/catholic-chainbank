<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank</title><script src="https://cdn.tailwindcss.com"></script><script src="lang.js"></script><style>body{background:radial-gradient(circle at 10%20%,#0B132B,#070C1A);color:white;font-family:sans-serif;}.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border-radius:2rem;padding:1.5rem;margin-bottom:1.5rem;}.btn{padding:0.7rem 1.2rem;border-radius:2rem;font-weight:600;cursor:pointer;display:inline-block;text-align:center;background:rgba(255,255,255,0.1);}.btn-primary{background:linear-gradient(90deg,#C5A059,#FFDF85);color:#0B132B;}.btn-danger{background:#b91c1c;}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}.modal-content{background:#0B132B;border-radius:2rem;padding:1.5rem;max-width:500px;width:90%;}</style></head>
<body class="p-4"><div class="max-w-7xl mx-auto">
<div class="flex flex-wrap justify-between items-center gap-3 mb-6"><h1 class="text-3xl font-bold" data-i18n="title">Chain Bank</h1><div id="lang-switcher" class="flex gap-1"></div></div>
<div class="flex flex-wrap gap-2 mb-6"><a href="candles.html" class="btn" data-i18n="candles">🕯️ Свечи</a><a href="charity.html" class="btn" data-i18n="charity">🤝 Благотворительность</a><a href="stake.html" class="btn" data-i18n="staking">💎 Стейкинг</a><a href="dao.html" class="btn" data-i18n="dao">🗳️ DAO</a><a href="memory.html" class="btn" data-i18n="memory">📖 Книга памяти</a></div>
<div class="glass"><h2 class="text-xl font-bold mb-3" data-i18n="yourWallet">Ваш Solana кошелёк</h2><input type="text" id="userWallet" class="w-full p-2 rounded bg-black/50 border mb-2"><input type="text" id="userName" class="w-full p-2 rounded bg-black/50 border mb-2" data-i18n="yourName"><button id="saveDataBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="save">Сохранить</button></div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"><div class="glass text-center"><div class="text-sm" data-i18n="forGod">📿 За Бога</div><div class="text-2xl font-bold" id="forGodCount">0</div></div><div class="glass text-center"><div class="text-sm" data-i18n="againstGod">💀 Против Бога</div><div class="text-2xl font-bold" id="againstGodCount">0</div></div><div class="glass text-center"><div class="text-sm" data-i18n="candles">🕯️ Свечей горит</div><div class="text-2xl font-bold" id="candlesCount">0</div></div></div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6"><button id="forGodBtn" class="btn-primary py-2 rounded-full" data-i18n="forGod">📿 За Бога</button><button id="againstGodBtn" class="btn-danger py-2 rounded-full" data-i18n="againstGod">💀 Против Бога</button><button id="eternalBtn" class="btn-primary py-2 rounded-full" data-i18n="eternal">✨ Вечная свеча</button></div>
<div class="glass" id="txidForm" style="display:none;"><h2 class="text-xl font-bold mb-3" data-i18n="verify">🔍 Подтверждение</h2><p id="txActionDesc" class="text-sm mb-2"></p><input type="text" id="txidInput" class="w-full p-2 rounded bg-black/50 border mb-2" data-i18n="txid"><button id="verifyBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="verify">Проверить</button><div id="verifyStatus" class="text-sm mt-2"></div></div>
<div class="glass"><h2 class="text-xl font-bold mb-3" data-i18n="refer">👥 Приведи друга</h2><div class="flex gap-2"><input type="text" id="refLink" readonly class="w-full p-2 rounded bg-black/50 border"><button id="copyRefBtn" class="btn-primary px-4 py-2 rounded-full">📋</button></div></div>
<div class="glass"><h2 class="text-xl font-bold mb-3" data-i18n="review">📝 Отзывы</h2><div id="reviewsList" class="max-h-48 overflow-y-auto text-sm mb-3"></div><textarea id="newReview" rows="2" class="w-full p-2 rounded bg-black/50 border mb-2"></textarea><button id="addReviewBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="review">Оставить отзыв</button></div></div>
<script>const ADDRESSES={DEUS:"AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ",DIABOLUS:"2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj"};let currentAction=null;let userWallet=localStorage.getItem('userWallet')||'';let userName=localStorage.getItem('userName')||'';document.getElementById('userWallet').value=userWallet;document.getElementById('userName').value=userName;document.getElementById('saveDataBtn').onclick=()=>{localStorage.setItem('userWallet',document.getElementById('userWallet').value);localStorage.setItem('userName',document.getElementById('userName').value);userWallet=document.getElementById('userWallet').value;userName=document.getElementById('userName').value;alert('Saved');};function showTxidForm(action,desc){if(!userWallet){alert('Enter wallet');return;}currentAction=action;document.getElementById('txActionDesc').innerText=desc;document.getElementById('txidForm').style.display='block';document.getElementById('txidInput').value='';document.getElementById('verifyStatus').innerHTML='';}
document.getElementById('forGodBtn').onclick=()=>showTxidForm('forGod','Send 1 VBDC to DEUS. Enter TXID:');document.getElementById('againstGodBtn').onclick=()=>showTxidForm('againstGod','Send 1 DEUS to DIABOLUS. Enter TXID:');document.getElementById('eternalBtn').onclick=()=>showTxidForm('eternal','Send 1 VBST + 1 VBDC to DEUS. Enter TXID:');
document.getElementById('verifyBtn').onclick=async()=>{const txid=document.getElementById('txidInput').value.trim();if(!txid){alert('Enter TXID');return;}document.getElementById('verifyStatus').innerHTML='⏳...';try{const url=`https://public-api.solscan.io/transaction/${txid}`;const resp=await fetch(url);const data=await resp.json();if(!data||!data.txId)throw new Error('TX not found');const signer=data.signer?.[0]||data.accountKeys?.[0];if(signer!==userWallet)throw new Error('TX not from your wallet');let isValid=false;if(currentAction==='forGod'){const transfer=data.tokenTransfers?.find(t=>t.mint==="2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj"&&t.to===ADDRESSES.DEUS&&parseInt(t.amount)>=1e9);if(transfer)isValid=true;}else if(currentAction==='againstGod'){const transfer=data.tokenTransfers?.find(t=>t.mint===ADDRESSES.DEUS&&t.to===ADDRESSES.DIABOLUS&&parseInt(t.amount)>=1e9);if(transfer)isValid=true;}else if(currentAction==='eternal'){const vbdcOk=data.tokenTransfers?.some(t=>t.mint==="2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj"&&t.to===ADDRESSES.DEUS&&parseInt(t.amount)>=1e9);const vbstOk=data.tokenTransfers?.some(t=>t.mint==="8mse7Sm7xy1pfp6cP8LdZ1oh2RsdGAZajuEENDd2tbbk"&&t.to===ADDRESSES.DEUS&&parseInt(t.amount)>=1e9);if(vbdcOk&&vbstOk)isValid=true;}if(!isValid)throw new Error('TX does not match action');const now=new Date();const expires=new Date(now.getTime()+60*60*1000);const candle={wallet:userWallet,name:userName||userWallet.slice(0,8),action:currentAction,timestamp:now.toISOString(),expires:currentAction==='eternal'?null:expires.toISOString(),txid};let candles=JSON.parse(localStorage.getItem('candles')||'[]');candles.push(candle);localStorage.setItem('candles',JSON.stringify(candles));document.getElementById('verifyStatus').innerHTML='✅ Candle added!';setTimeout(()=>{window.location.href='candles.html';},1500);}catch(err){document.getElementById('verifyStatus').innerHTML=`❌ ${err.message}`;}};
function updateCounters(){let candles=JSON.parse(localStorage.getItem('candles')||'[]');let now=new Date();let active=candles.filter(c=>{if(c.action==='eternal')return true;if(c.expires&&new Date(c.expires)>now)return true;return false;});document.getElementById('candlesCount').innerText=active.length;let forGod=candles.filter(c=>c.action==='forGod'||c.action==='eternal').length;let againstGod=candles.filter(c=>c.action==='againstGod').length;document.getElementById('forGodCount').innerText=forGod;document.getElementById('againstGodCount').innerText=againstGod;}
setInterval(updateCounters,60000);updateCounters();
let reviews=JSON.parse(localStorage.getItem('reviews')||'[]');function renderReviews(){let container=document.getElementById('reviewsList');if(reviews.length===0){container.innerHTML='<div class="opacity-60">No reviews yet</div>';return;}container.innerHTML=reviews.map(r=>`<div>⭐ ${r.name}: ${r.text}</div>`).join('');}
document.getElementById('addReviewBtn').onclick=()=>{let text=document.getElementById('newReview').value.trim();if(!text)return;let name=userName||userWallet?.slice(0,8)||'Anonymous';reviews.unshift({name,text,date:new Date().toISOString()});localStorage.setItem('reviews',JSON.stringify(reviews));renderReviews();document.getElementById('newReview').value='';};renderReviews();
let refLink=document.getElementById('refLink');refLink.value=`${window.location.origin}?ref=${userWallet||'guest'}`;document.getElementById('copyRefBtn').onclick=()=>{refLink.select();document.execCommand('copy');alert('Copied!');};</script></body></html>
