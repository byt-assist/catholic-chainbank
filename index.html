<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Bank · VBDT · VBST · VBDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at 10% 20%, #0B132B, #070C1A); color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border-radius: 2rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .btn { padding: 0.7rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; display: inline-block; text-align: center; background: rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(90deg, #C5A059, #FFDF85); color: #0B132B; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0B132B; border-radius: 2rem; padding: 1.5rem; max-width: 500px; width: 90%; }
    </style>
</head>
<body class="p-4">

<div class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Chain Bank</h1>
        <a href="candles.html" class="btn">🕯️ Свечи</a>
    </div>

    <!-- Форма для имени и кошелька -->
    <div class="glass">
        <h2 class="text-xl font-bold mb-3">👤 Ваши данные для свечей</h2>
        <input type="text" id="userWallet" placeholder="Ваш Solana кошелёк (обязательно)" class="w-full p-2 rounded bg-black/50 border mb-2">
        <input type="text" id="userName" placeholder="Ваше имя (будет на свече)" class="w-full p-2 rounded bg-black/50 border mb-2">
        <button id="saveDataBtn" class="btn-primary w-full py-2 rounded-full">Сохранить</button>
    </div>

    <!-- Кнопки действий -->
    <div class="glass">
        <h2 class="text-xl font-bold mb-3">🔥 Выберите действие</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <button id="forGodBtn" class="btn-primary py-2 rounded-full">📿 За Бога (1 VBDC → DEUS)</button>
            <button id="againstGodBtn" class="btn-danger py-2 rounded-full" style="background:#b91c1c;">💀 Против Бога (1 DEUS → DIABOLUS)</button>
            <button id="eternalBtn" class="btn-primary py-2 rounded-full">✨ Вечная свеча (1 VBST + 1 VBDC → DEUS)</button>
        </div>
    </div>

    <!-- Форма для ввода TXID -->
    <div class="glass" id="txidForm" style="display: none;">
        <h2 class="text-xl font-bold mb-3">🔍 Подтверждение</h2>
        <p id="txActionDesc" class="text-sm mb-2"></p>
        <input type="text" id="txidInput" placeholder="Вставьте TXID (хеш транзакции)" class="w-full p-2 rounded bg-black/50 border mb-2">
        <button id="verifyBtn" class="btn-primary w-full py-2 rounded-full">Проверить и добавить свечу</button>
        <div id="verifyStatus" class="text-sm mt-2"></div>
    </div>
</div>

<script>
    // Адреса
    const ADDRESSES = {
        DEUS: "AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ",
        DIABOLUS: "2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj"
    };

    let currentAction = null; // 'forGod', 'againstGod', 'eternal'
    let userWallet = localStorage.getItem('userWallet') || '';
    let userName = localStorage.getItem('userName') || '';

    document.getElementById('userWallet').value = userWallet;
    document.getElementById('userName').value = userName;

    document.getElementById('saveDataBtn').onclick = () => {
        localStorage.setItem('userWallet', document.getElementById('userWallet').value);
        localStorage.setItem('userName', document.getElementById('userName').value);
        userWallet = document.getElementById('userWallet').value;
        userName = document.getElementById('userName').value;
        alert('Данные сохранены');
    };

    function showTxidForm(action, desc) {
        if (!userWallet) { alert('Сначала введите ваш кошелёк'); return; }
        currentAction = action;
        document.getElementById('txActionDesc').innerText = desc;
        document.getElementById('txidForm').style.display = 'block';
        document.getElementById('txidInput').value = '';
        document.getElementById('verifyStatus').innerHTML = '';
    }

    document.getElementById('forGodBtn').onclick = () => showTxidForm('forGod', 'Отправьте 1 VBDC на адрес DEUS. Вставьте TXID:');
    document.getElementById('againstGodBtn').onclick = () => showTxidForm('againstGod', 'Отправьте 1 DEUS на адрес DIABOLUS. Вставьте TXID:');
    document.getElementById('eternalBtn').onclick = () => showTxidForm('eternal', 'Отправьте 1 VBST + 1 VBDC на адрес DEUS (две транзакции или одна с двумя токенами). Вставьте TXID:');

    document.getElementById('verifyBtn').onclick = async () => {
        const txid = document.getElementById('txidInput').value.trim();
        if (!txid) { alert('Введите TXID'); return; }
        document.getElementById('verifyStatus').innerHTML = '⏳ Проверяем...';

        try {
            // 1. Запрашиваем данные транзакции через Solscan API
            const url = `https://public-api.solscan.io/transaction/${txid}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (!data || !data.txId) throw new Error('Транзакция не найдена');

            // 2. Проверяем, что отправитель совпадает с userWallet
            const signer = data.signer?.[0] || data.accountKeys?.[0];
            if (signer !== userWallet) throw new Error('TXID не соответствует вашему кошельку');

            // 3. Проверяем действия в зависимости от currentAction
            let isValid = false;
            if (currentAction === 'forGod') {
                // Проверяем: отправлен VBDC на DEUS
                const transfer = data.tokenTransfers?.find(t => 
                    t.mint === "2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj" && // VBDC
                    t.to === ADDRESSES.DEUS &&
                    parseInt(t.amount) >= 1_000_000_000
                );
                if (transfer) isValid = true;
            } 
            else if (currentAction === 'againstGod') {
                const transfer = data.tokenTransfers?.find(t => 
                    t.mint === "AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ" && // DEUS
                    t.to === ADDRESSES.DIABOLUS &&
                    parseInt(t.amount) >= 1_000_000_000
                );
                if (transfer) isValid = true;
            }
            else if (currentAction === 'eternal') {
                // Проверяем: отправлены VBST и VBDC на DEUS (два перевода)
                const vbdcOk = data.tokenTransfers?.some(t => 
                    t.mint === "2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj" &&
                    t.to === ADDRESSES.DEUS && parseInt(t.amount) >= 1_000_000_000
                );
                const vbstOk = data.tokenTransfers?.some(t => 
                    t.mint === "8mse7Sm7xy1pfp6cP8LdZ1oh2RsdGAZajuEENDd2tbbk" &&
                    t.to === ADDRESSES.DEUS && parseInt(t.amount) >= 1_000_000_000
                );
                if (vbdcOk && vbstOk) isValid = true;
            }

            if (!isValid) throw new Error('Транзакция не соответствует действию');

            // 4. Сохраняем свечу в localStorage
            const now = new Date();
            const expires = new Date(now.getTime() + 60*60*1000); // +1 час
            const candle = {
                wallet: userWallet,
                name: userName || userWallet.slice(0,8),
                action: currentAction,
                timestamp: now.toISOString(),
                expires: currentAction === 'eternal' ? null : expires.toISOString(),
                txid: txid
            };

            let candles = JSON.parse(localStorage.getItem('candles') || '[]');
            candles.push(candle);
            localStorage.setItem('candles', JSON.stringify(candles));

            document.getElementById('verifyStatus').innerHTML = '✅ Свеча добавлена! Перейдите на страницу "Свечи".';
            setTimeout(() => { window.location.href = 'candles.html'; }, 2000);
        } catch (err) {
            document.getElementById('verifyStatus').innerHTML = `❌ Ошибка: ${err.message}`;
        }
    };
</script>
</body>
</html>
