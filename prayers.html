<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Prayer Intentions</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;}.glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;}.btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1510;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">🙏 Prayer Intentions</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back</a></div>
<div class="glass"><h2 class="text-xl font-bold mb-3">Share your prayer request</h2><input type="text" id="prayerName" placeholder="Your name (optional)" class="w-full p-2 rounded bg-black/50 border mb-2"><textarea id="prayerText" rows="3" placeholder="Your prayer intention..." class="w-full p-2 rounded bg-black/50 border mb-2"></textarea><button id="submitPrayer" class="btn-primary w-full">Submit</button></div>
<div class="glass"><h2 class="text-xl font-bold mb-3">Community prayers</h2><div id="prayersList"></div></div></div>
<script>let prayers=JSON.parse(localStorage.getItem('prayers')||'[]');function render(){let container=document.getElementById('prayersList');if(prayers.length===0){container.innerHTML='<div class="opacity-60">No intentions yet. Be the first to share.</div>';return;}container.innerHTML=prayers.map(p=>`<div class="mb-3 p-3 rounded bg-black/30 border"><div class="font-bold">${p.name||'Anonymous'}</div><div class="italic">“${p.text}”</div><div class="text-xs opacity-60 mt-1">🙏 ${p.supports||0} people prayed</div><button class="supportBtn mt-1 btn-primary px-3 py-1 text-sm rounded-full" data-id="${p.id}">🙏 I pray for this</button></div>`).join('');document.querySelectorAll('.supportBtn').forEach(btn=>btn.onclick=()=>{let id=btn.dataset.id;let idx=prayers.findIndex(p=>p.id==id);if(idx!==-1){prayers[idx].supports=(prayers[idx].supports||0)+1;localStorage.setItem('prayers',JSON.stringify(prayers));render();}});}
document.getElementById('submitPrayer').onclick=()=>{let name=document.getElementById('prayerName').value.trim();let text=document.getElementById('prayerText').value.trim();if(!text)return;prayers.unshift({id:Date.now(),name,text,supports:0,date:new Date().toISOString()});localStorage.setItem('prayers',JSON.stringify(prayers));render();document.getElementById('prayerText').value='';};render();</script></body></html>
