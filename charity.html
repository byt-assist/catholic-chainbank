<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank - Charity</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;font-family:'Inter',sans-serif;}.glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border:1px solid rgba(197,160,89,0.3);border-radius:24px;}.btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1510;font-weight:600;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;text-align:center;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6 pb-3 border-b border-gold/30"><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;">🤝 Charity</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back to Home</a></div>
<div class="glass p-6 mb-6"><h2 class="text-xl font-bold mb-3">📋 Active Funds</h2><div id="charityList"></div></div>
<div class="glass p-6"><h2 class="text-xl font-bold mb-3">➕ Create Fund</h2><input type="text" id="charityName" placeholder="Fund name (e.g., Help Church)" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"><input type="text" id="charityGoal" placeholder="Goal in USD" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"><button id="addCharityBtn" class="btn-primary w-full py-2 rounded-full">Create Fund</button></div>
</div>
<script>let charities=JSON.parse(localStorage.getItem('charities')||'[{"name":"Help Church","goal":5000,"raised":1201},{"name":"Orphanage","goal":3000,"raised":450}]');function render(){let container=document.getElementById('charityList');if(charities.length===0){container.innerHTML='<div class="opacity-60 text-center">No active funds</div>';return;}container.innerHTML=charities.map(c=>`<div class="mb-3 p-3 rounded bg-black/30 border border-gold/30"><div class="font-bold">${c.name}</div><div>💰 $${c.raised} of $${c.goal}</div><div class="w-full bg-gray-700 rounded-full h-2 mt-1"><div class="bg-green-500 h-2 rounded-full" style="width:${(c.raised/c.goal)*100}%"></div></div><button class="donateBtn mt-2 btn-primary px-3 py-1 text-sm rounded-full" data-name="${c.name}">🤝 Donate</button></div>`).join('');document.querySelectorAll('.donateBtn').forEach(btn=>btn.onclick=()=>{let name=btn.dataset.name;let amount=prompt('Amount in USD');if(amount){let idx=charities.findIndex(c=>c.name===name);if(idx!==-1){charities[idx].raised+=Number(amount);localStorage.setItem('charities',JSON.stringify(charities));render();alert('Thank you for your donation!');}}});}
document.getElementById('addCharityBtn').onclick=()=>{let name=document.getElementById('charityName').value.trim();let goal=Number(document.getElementById('charityGoal').value);if(!name||!goal)return;charities.push({name,goal,raised:0});localStorage.setItem('charities',JSON.stringify(charities));render();document.getElementById('charityName').value='';document.getElementById('charityGoal').value='';alert('Fund created!');};render();</script></body></html>
