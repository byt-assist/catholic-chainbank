<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Parishes</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">⛪ Support your Parish</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back</a></div>
<div class="bg-black/30 p-6 rounded-xl mb-4"><h2 class="text-xl font-bold mb-3">Parish leader? Get your referral code</h2><button id="getCodeBtn" class="btn-primary px-4 py-2 rounded-full">Get parish code</button><div id="codeDisplay" class="mt-3 hidden"><p class="text-sm">Your referral link:</p><input type="text" id="refCode" readonly class="w-full p-2 rounded bg-black/50 border"></div></div>
<div class="bg-black/30 p-6 rounded-xl"><h2 class="text-xl font-bold mb-3">Support your parish</h2><p>Use a parish referral code when you donate. 5% of your donation will go to that parish.</p><input type="text" id="parishCode" placeholder="Enter parish code" class="w-full p-2 rounded bg-black/50 border mb-2"><button id="supportBtn" class="btn-primary w-full py-2 rounded-full">Donate with support</button></div></div>
<script>document.getElementById('getCodeBtn').onclick=()=>{let wallet=localStorage.getItem('userWallet')||'';if(!wallet){alert('Save your wallet on main page first');return;}let code=btoa(wallet).slice(0,16);document.getElementById('codeDisplay').classList.remove('hidden');document.getElementById('refCode').value=`${window.location.origin}?ref=${code}`;};document.getElementById('supportBtn').onclick=()=>{let code=document.getElementById('parishCode').value;if(code){alert(`Thank you! Your donation will support parish ${code}. After sending tokens, verify TXID on main page.`);}else alert('Enter parish code');};</script></body></html>
