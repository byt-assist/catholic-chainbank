<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession · Vatican Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js"></script>
    <style>
        body{background:linear-gradient(135deg,#2B2B2B 0%,#1A1A1A 100%);color:#F5F0E8;font-family:'Inter',sans-serif;}
        .glass{background:rgba(43,43,43,0.85);backdrop-filter:blur(12px);border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid rgba(197,160,89,0.4);}
        .btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1A1A;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;cursor:pointer;}
        .btn-secondary{background:rgba(197,160,89,0.15);border:1px solid rgba(197,160,89,0.4);padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;cursor:pointer;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:#0B132B;border-radius:2rem;padding:1.5rem;max-width:500px;width:90%;border:1px solid #C5A059;}
        .address-box{background:#00000066;padding:0.75rem;border-radius:1rem;font-family:monospace;word-break:break-all;font-size:0.8rem;border:1px solid #FFDF85;margin:1rem 0;}
        .copy-btn{background:#C5A059;color:#1A1510;padding:0.3rem 0.8rem;border-radius:1rem;font-size:0.7rem;cursor:pointer;display:inline-block;}
    </style>
</head>
<body class="p-4">
<div class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold" data-i18n="confession_title">🙏 Confession</h1>
        <a href="index.html" class="btn-secondary" data-i18n="back">← Back to Home</a>
    </div>
    <div class="glass">
        <h2 class="text-xl font-bold mb-3" data-i18n="confession_desc">Write your sin (anonymous)</h2>
        <textarea id="sinText" rows="4" class="w-full p-3 rounded-xl bg-black/50 border border-gold/30 mb-3" data-i18n-placeholder="confession_placeholder"></textarea>
        <button id="showAddressBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="confession_send">📨 Send confession (1 VBST)</button>
    </div>
    <div class="glass">
        <h2 class="text-xl font-bold mb-3" data-i18n="sins_list">💬 Sins and answers</h2>
        <div id="confessionsList" class="space-y-3 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<div id="confessionModal" class="modal">
    <div class="modal-content">
        <h3 class="text-xl font-bold mb-2 text-gold-light" data-i18n="confession_address_title">📿 Send your confession</h3>
        <p class="text-sm mb-2" data-i18n="confession_address_desc">Send 1 VBST to God's address, then paste TXID:</p>
        <div class="address-box"><strong data-i18n="confession_god_address">📤 God's address:</strong><br>AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ</div>
        <button id="copyGodAddressBtn" class="copy-btn mb-3" data-i18n="confession_copy">📋 Copy address</button>
        <input type="text" id="txidInput" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2" data-i18n-placeholder="confession_txid">
        <button id="submitConfessionBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="confession_confirm">✅ Confirm confession</button>
        <div id="confessionStatus" class="text-xs mt-2 text-center"></div>
        <button id="closeConfessionModal" class="btn-secondary w-full mt-3 py-2 rounded-full" data-i18n="confession_close">Close</button>
    </div>
</div>

<script>
const GOD_ADDRESS = "AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ";
let userWallet = localStorage.getItem('userWallet') || '';
const answers = { en: ["Pray the 'Our Father' 3 times.", "Fast for three days.", "Confess to a priest in the church.", "God forgives, go in peace.", "Help your neighbor — it will cleanse your soul."] };
function getRandomAnswer() { const list = answers.en; return list[Math.floor(Math.random() * list.length)]; }
let confessions = JSON.parse(localStorage.getItem('confessions') || '[]');
function renderConfessions() { const container = document.getElementById('confessionsList'); if (confessions.length === 0) { container.innerHTML = '<div class="opacity-60 text-center" data-i18n="no_confessions">No confessions yet. Be the first!</div>'; return; } container.innerHTML = confessions.map(c => `<div class="p-3 rounded bg-black/30 border border-gold/30"><div class="italic">${c.text}</div><div class="text-sm text-gold-light mt-1">💬 ${c.answer}</div><div class="text-xs opacity-50 mt-1">Sinner #${c.id} · ${c.date}</div></div>`).join(''); }
document.getElementById('showAddressBtn').onclick = () => { document.getElementById('confessionModal').style.display = 'flex'; document.getElementById('txidInput').value = ''; document.getElementById('confessionStatus').innerHTML = ''; };
document.getElementById('copyGodAddressBtn').onclick = () => { navigator.clipboard.writeText(GOD_ADDRESS); alert('Address copied'); };
document.getElementById('submitConfessionBtn').onclick = async () => { const sinText = document.getElementById('sinText').value.trim(); const txid = document.getElementById('txidInput').value.trim(); if (!sinText) { alert('Write your sin'); return; } if (!txid) { alert('Enter TXID'); return; } if (!userWallet) { alert('First save your wallet on the main page'); return; } document.getElementById('confessionStatus').innerHTML = '⏳ Verifying...'; try { const url = `https://public-api.solscan.io/transaction/${txid}`; const resp = await fetch(url); const data = await resp.json(); if (!data || !data.txId) throw new Error('Transaction not found'); const signer = data.signer?.[0] || data.accountKeys?.[0]; if (signer !== userWallet) throw new Error('TXID not from your wallet'); const transfer = data.tokenTransfers?.find(t => t.to === GOD_ADDRESS && parseInt(t.amount) >= 1_000_000_000); if (!transfer) throw new Error('No 1 VBST transfer to God address found'); const newConfession = { id: Math.floor(Math.random() * 10000), text: sinText, answer: getRandomAnswer(), date: new Date().toLocaleString(), txid: txid }; confessions.unshift(newConfession); localStorage.setItem('confessions', JSON.stringify(confessions)); document.getElementById('confessionStatus').innerHTML = '✅ Confession accepted!'; document.getElementById('sinText').value = ''; document.getElementById('txidInput').value = ''; renderConfessions(); setTimeout(() => { document.getElementById('confessionModal').style.display = 'none'; }, 1500); } catch (err) { document.getElementById('confessionStatus').innerHTML = `❌ ${err.message}`; } };
document.getElementById('closeConfessionModal').onclick = () => { document.getElementById('confessionModal').style.display = 'none'; };
window.onclick = (e) => { if (e.target === document.getElementById('confessionModal')) document.getElementById('confessionModal').style.display = 'none'; };
renderConfessions();
</script>
</body>
</html>
