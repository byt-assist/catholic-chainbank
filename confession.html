<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исповедь · Chain Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js"></script>
    <style>
        body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;}
        .glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;}
        .btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1510;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;}
        .btn-secondary{background:rgba(197,160,89,0.15);border:1px solid rgba(197,160,89,0.4);padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;}
    </style>
</head>
<body class="p-4">
<div class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">🙏 Анонимная исповедь</h1><a href="index.html" class="btn-secondary">← На главную</a></div>
    
    <div class="glass">
        <h2 class="text-xl font-bold mb-3">Напишите ваш грех (анонимно)</h2>
        <textarea id="sinText" rows="4" class="w-full p-3 rounded-xl bg-black/50 border border-gold/30 mb-3" placeholder="Опишите, что тяготит вашу душу..."></textarea>
        
        <p class="text-sm mb-2">Отправьте 1 USVT / VBST на адрес <strong id="godAddress">(загружается...)</strong></p>
        <input type="text" id="txidInput" class="w-full p-3 rounded-xl bg-black/50 border border-gold/30 mb-3" placeholder="Вставьте TXID">
        
        <button id="submitConfession" class="btn-primary w-full py-2 rounded-full">Отправить исповедь</button>
        <div id="status" class="text-sm mt-3 text-center"></div>
    </div>
    
    <div class="glass">
        <h2 class="text-xl font-bold mb-3">💬 Грехи и ответы</h2>
        <div id="confessionsList" class="space-y-3 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<script>
    // Определяем, какой сайт открыт (православный или католический)
    const isOrthodox = window.location.hostname === 'byt-assist.github.io' && window.location.pathname.includes('chainbank');
    const GOD_ADDRESS = isOrthodox ? "DpgFgCXatvnegBAHBkNpd2cbEiyFL8E9sY1o6mp4EGhe" : "AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ";
    const TOKEN_SYMBOL = isOrthodox ? "USVT" : "VBST";
    document.getElementById('godAddress').innerText = GOD_ADDRESS;
    
    let currentLang = localStorage.getItem('chainbank_lang') || 'ru';
    
    // Заготовленные ответы (на разных языках)
    const answers = {
        ru: ["Прочитайте молитву «Отче наш» 3 раза.", "Поститесь три дня.", "Исповедуйтесь священнику в храме.", "Бог простит, идите с миром.", "Помогите ближнему — это очистит душу."],
        en: ["Pray the 'Our Father' 3 times.", "Fast for three days.", "Confess to a priest in the church.", "God forgives, go in peace.", "Help your neighbor — it will cleanse your soul."]
    };
    
    function getRandomAnswer(lang) {
        const list = answers[lang] || answers.en;
        return list[Math.floor(Math.random() * list.length)];
    }
    
    // Загрузка исповедей из localStorage
    let confessions = JSON.parse(localStorage.getItem('confessions') || '[]');
    
    function renderConfessions() {
        const container = document.getElementById('confessionsList');
        if (confessions.length === 0) {
            container.innerHTML = '<div class="opacity-60 text-center">Пока нет исповедей. Будьте первым!</div>';
            return;
        }
        container.innerHTML = confessions.map(c => `
            <div class="p-3 rounded bg-black/30 border border-gold/30">
                <div class="italic">${c.text}</div>
                <div class="text-sm text-gold-light mt-1">💬 ${c.answer}</div>
                <div class="text-xs opacity-50 mt-1">Грешник #${c.id} · ${c.date}</div>
            </div>
        `).join('');
    }
    
    document.getElementById('submitConfession').onclick = async () => {
        const sinText = document.getElementById('sinText').value.trim();
        const txid = document.getElementById('txidInput').value.trim();
        if (!sinText || !txid) {
            alert('Напишите грех и вставьте TXID');
            return;
        }
        document.getElementById('status').innerHTML = '⏳ Проверяем транзакцию...';
        
        try {
            // Проверка TXID через Solscan
            const url = `https://public-api.solscan.io/transaction/${txid}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (!data || !data.txId) throw new Error('Транзакция не найдена');
            
            // Проверяем, что токен отправлен на правильный адрес
            const transfer = data.tokenTransfers?.find(t => 
                t.to === GOD_ADDRESS && 
                (parseInt(t.amount) >= 1_000_000_000)
            );
            if (!transfer) throw new Error('Не найден перевод 1 токена на адрес Бога');
            
            // Создаём запись исповеди
            const newConfession = {
                id: Math.floor(Math.random() * 10000),
                text: sinText,
                answer: getRandomAnswer(currentLang),
                date: new Date().toLocaleString(),
                txid: txid
            };
            confessions.unshift(newConfession);
            localStorage.setItem('confessions', JSON.stringify(confessions));
            
            document.getElementById('status').innerHTML = '✅ Исповедь отправлена. Ответ священника появится выше.';
            document.getElementById('sinText').value = '';
            document.getElementById('txidInput').value = '';
            renderConfessions();
        } catch (err) {
            document.getElementById('status').innerHTML = `❌ ${err.message}`;
        }
    };
    
    renderConfessions();
</script>
</body>
</html>
