<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank - DAO</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;font-family:'Inter',sans-serif;}.glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border:1px solid rgba(197,160,89,0.3);border-radius:24px;}.btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1510;font-weight:600;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;text-align:center;}.btn-danger{background:#b91c1c;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6 pb-3 border-b border-gold/30"><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;">🗳️ DAO Voting</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back to Home</a></div>
<div class="glass p-6 mb-6"><h2 class="text-xl font-bold mb-3">Your wallet (for voting)</h2><input type="text" id="daoWallet" placeholder="Your Solana wallet" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2"><button id="checkVotesBtn" class="btn-primary w-full py-2 rounded-full">Check my votes</button></div>
<div class="glass p-6 mb-6"><h2 class="text-xl font-bold mb-3">📋 Active Proposals</h2><div id="proposalsList"></div></div>
<div class="glass p-6"><h2 class="text-xl font-bold mb-3">🗳️ My Votes</h2><div id="myVotes"></div></div>
</div>
<script>let proposals=JSON.parse(localStorage.getItem('proposals')||'[{"id":1,"title":"Send 10% of treasury to help orphanage","votesFor":125,"votesAgainst":30},{"id":2,"title":"Add new token BLESS","votesFor":200,"votesAgainst":45}]');let userVotes=JSON.parse(localStorage.getItem('userVotes')||'[]');function renderProposals(){let wallet=document.getElementById('daoWallet').value;let container=document.getElementById('proposalsList');if(proposals.length===0){container.innerHTML='<div class="opacity-60 text-center">No active proposals</div>';return;}container.innerHTML=proposals.map(p=>`<div class="mb-3 p-3 rounded bg-black/30 border border-gold/30"><div class="font-bold">${p.title}</div><div>✅ ${p.votesFor} | ❌ ${p.votesAgainst}</div><button class="voteForBtn btn-primary px-3 py-1 text-sm rounded-full mt-1" data-id="${p.id}">Vote FOR</button> <button class="voteAgainstBtn btn-danger px-3 py-1 text-sm rounded-full mt-1" data-id="${p.id}">Vote AGAINST</button></div>`).join('');document.querySelectorAll('.voteForBtn,.voteAgainstBtn').forEach(btn=>btn.onclick=()=>{let id=Number(btn.dataset.id);let voteType=btn.classList.contains('voteForBtn')?'for':'against';let wallet=document.getElementById('daoWallet').value;if(!wallet){alert('Enter wallet');return;}if(userVotes.some(v=>v.wallet===wallet&&v.proposalId===id)){alert('Already voted');return;}let prop=proposals.find(p=>p.id===id);if(voteType==='for')prop.votesFor+=1;else prop.votesAgainst+=1;userVotes.push({wallet,proposalId:id,vote:voteType});localStorage.setItem('proposals',JSON.stringify(proposals));localStorage.setItem('userVotes',JSON.stringify(userVotes));renderProposals();renderMyVotes();alert('Vote counted');});}
function renderMyVotes(){let wallet=document.getElementById('daoWallet').value;if(!wallet){document.getElementById('myVotes').innerHTML='<div class="opacity-60 text-center">Enter wallet</div>';return;}let my=userVotes.filter(v=>v.wallet===wallet);if(my.length===0){document.getElementById('myVotes').innerHTML='<div class="opacity-60 text-center">No votes yet</div>';return;}document.getElementById('myVotes').innerHTML=my.map(v=>`<div class="mb-1">Proposal #${v.proposalId}: ${v.vote==='for'?'✅ FOR':'❌ AGAINST'}</div>`).join('');}
document.getElementById('checkVotesBtn').onclick=renderMyVotes;renderProposals();renderMyVotes();</script></body></html>
