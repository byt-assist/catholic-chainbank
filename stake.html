<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стейкинг · Chain Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:radial-gradient(circle at 10%20%,#0B132B,#070C1A);color:white;}.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border-radius:2rem;padding:1.5rem;margin-bottom:1.5rem;}.btn{padding:0.7rem 1.2rem;border-radius:2rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.1);display:inline-block;}.btn-primary{background:linear-gradient(90deg,#C5A059,#FFDF85);color:#0B132B;}</style>
</head>
<body class="p-4">
<div class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">💎 Стейкинг</h1><a href="index.html" class="btn">← На главную</a></div>
    <div class="glass"><h2 class="text-xl font-bold mb-3">Ваш кошелёк</h2><input type="text" id="stakeWallet" placeholder="Ваш Solana кошелёк" class="w-full p-2 rounded bg-black/50 border mb-2"><button id="loadStakesBtn" class="btn-primary w-full py-2 rounded-full">Загрузить мои стейки</button></div>
    <div class="glass"><h2 class="text-xl font-bold mb-3">📈 Доступные пулы</h2><div id="poolsList"></div></div>
    <div class="glass"><h2 class="text-xl font-bold mb-3">🔒 Мои стейки</h2><div id="myStakes"></div></div>
</div>
<script>
    let stakes = JSON.parse(localStorage.getItem('stakes') || '[]');
    const pools = [{name:"DEUS (VBDT)", apr:12, minLock:7},{name:"SANCTUS (VBST)", apr:8, minLock:3}];
    function renderPools() {
        document.getElementById('poolsList').innerHTML = pools.map(p=>`<div class="mb-3 p-3 rounded bg-black/30"><div class="font-bold">${p.name}</div><div>APY: ${p.apr}% | Мин. блокировка: ${p.minLock} дней</div><button class="stakeBtn btn-primary px-3 py-1 text-sm rounded-full mt-2" data-pool="${p.name}">Застейкать</button></div>`).join('');
        document.querySelectorAll('.stakeBtn').forEach(btn=>btn.onclick=()=>{let poolName=btn.dataset.pool;let amount=prompt('Введите количество токенов');if(amount){let wallet=document.getElementById('stakeWallet').value;if(!wallet){alert('Введите кошелёк');return;}stakes.push({wallet,pool:poolName,amount:Number(amount),date:new Date().toISOString()});localStorage.setItem('stakes',JSON.stringify(stakes));renderMyStakes();alert('Стейкинг создан! Награды будут начисляться автоматически.');}});
    }
    function renderMyStakes() {
        let wallet=document.getElementById('stakeWallet').value;
        if(!wallet){document.getElementById('myStakes').innerHTML='<div class="opacity-60">Введите кошелёк</div>';return;}
        let my=stakes.filter(s=>s.wallet===wallet);
        if(my.length===0){document.getElementById('myStakes').innerHTML='<div class="opacity-60">Нет активных стейков</div>';return;}
        document.getElementById('myStakes').innerHTML=my.map(s=>`<div class="mb-2 p-2 rounded bg-black/30">${s.pool}: ${s.amount} токенов (с ${new Date(s.date).toLocaleDateString()})</div>`).join('');
    }
    document.getElementById('loadStakesBtn').onclick=renderMyStakes;
    renderPools(); renderMyStakes();
</script>
</body>
</html>
