<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Свечи · Chain Bank</title><script src="https://cdn.tailwindcss.com"></script><script src="lang.js"></script><link href="style.css" rel="stylesheet"></head>
<body class="p-4"><div class="max-w-4xl mx-auto">
<div class="flex flex-wrap justify-between items-center gap-3 mb-6 pb-3 border-b border-gold/30"><div class="flex items-center gap-2"><span class="text-3xl">🕯️</span><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;">Свечи и молитвы</h1></div><div class="flex gap-2"><div id="lang-switcher"></div><a href="index.html" class="btn-secondary px-4 py-2 rounded-full text-sm">← На главную</a></div></div>
<div class="glass p-6 mb-6 text-center"><div class="inline-block p-3 rounded-full bg-gold/10 mb-2"><span class="text-4xl candle-icon">🕊️</span></div><p class="italic text-beige/80">«Свеча, возжжённая с молитвой, — это мост между сердцем и Богом»</p></div>
<div class="glass p-6"><h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><span>🔥</span> Горящие свечи</h2><div id="candlesList" class="space-y-3"></div></div>
<div class="text-center text-xs opacity-50 mt-8 pb-4">Свеча горит 1 час. Вечная свеча никогда не гаснет.</div></div>
<script>function loadCandles(){let candles=JSON.parse(localStorage.getItem('candles')||'[]');let now=new Date();let active=candles.filter(c=>{if(c.action==='eternal')return true;if(c.expires&&new Date(c.expires)>now)return true;return false;});let container=document.getElementById('candlesList');if(active.length===0){container.innerHTML='<div class="text-center opacity-60 py-8">🙏 Пока нет свечей. Зажгите первую!</div>';return;}container.innerHTML=active.map(c=>{let isEternal=c.action==='eternal';let displayName=c.name||c.wallet.slice(0,8);let timeText=isEternal?'✨ ВЕЧНАЯ СВЕЧА ✨':`🕯️ горит до ${new Date(c.expires).toLocaleString()}`;let icon=isEternal?'✨':'🕯️';return `<div class="p-4 rounded-xl bg-black/30 border border-gold/30 flex items-center gap-3"><div class="text-2xl">${icon}</div><div><div class="font-bold text-gold-light">${displayName}</div><div class="text-sm opacity-80">${timeText}</div></div></div>`;}).join('');}
loadCandles();setInterval(loadCandles,60000);</script></body></html>
