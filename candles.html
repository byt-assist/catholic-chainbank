<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chain Bank - Candles</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;font-family:'Inter',sans-serif;}.glass{background:rgba(44,36,24,0.75);backdrop-filter:blur(12px);border:1px solid rgba(197,160,89,0.3);border-radius:24px;}.btn{padding:0.5rem 1.2rem;border-radius:40px;transition:0.2s;display:inline-block;text-align:center;}.btn-secondary{background:rgba(197,160,89,0.15);border:1px solid rgba(197,160,89,0.4);}.eternal{background:rgba(255,215,0,0.15);border-left:4px solid gold;}</style></head>
<body class="p-4"><div class="max-w-3xl mx-auto"><div class="flex justify-between items-center mb-6 pb-3 border-b border-gold/30"><h1 class="text-3xl font-bold" style="font-family:'Cormorant Garamond',serif; color:#FFDF85;">🕯️ Candles & Prayers</h1><a href="index.html" class="btn-secondary px-4 py-2 rounded-full text-sm">← Back to Home</a></div>
<div class="glass p-6 mb-6 text-center"><div class="inline-block p-3 rounded-full bg-gold/10 mb-2"><span class="text-4xl">🕊️</span></div><p class="italic">"A candle lit with prayer is a bridge between the heart and God"</p></div>
<div class="glass p-6"><h2 class="text-2xl font-bold mb-4">🔥 Burning Candles</h2><div id="candlesList" class="space-y-3"></div></div>
<div class="text-center text-xs opacity-50 mt-8 pb-4">A candle burns for 1 hour. Eternal candle never goes out.</div></div>
<script>function loadCandles(){let candles=JSON.parse(localStorage.getItem('candles')||'[]');let now=new Date();let active=candles.filter(c=>{if(c.action==='eternal')return true;if(c.expires&&new Date(c.expires)>now)return true;return false;});let container=document.getElementById('candlesList');if(active.length===0){container.innerHTML='<div class="text-center opacity-60 py-8">🙏 No candles yet. Light the first one!</div>';return;}container.innerHTML=active.map(c=>{let isEternal=c.action==='eternal';let displayName=c.name||c.wallet.slice(0,8);let timeText=isEternal?'✨ ETERNAL CANDLE ✨':`🕯️ expires ${new Date(c.expires).toLocaleString()}`;let icon=isEternal?'✨':'🕯️';return `<div class="p-4 rounded-xl bg-black/30 border border-gold/30 flex items-center gap-3"><div class="text-2xl">${icon}</div><div><div class="font-bold text-gold-light">${displayName}</div><div class="text-sm opacity-80">${timeText}</div></div></div>`;}).join('');}
loadCandles();setInterval(loadCandles,60000);</script></body></html>
