<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Virtual Pilgrim</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:radial-gradient(circle at 10%20%,#1A1510,#0D0A07);color:#F5E6D3;}</style></head>
<body class="p-4"><div class="max-w-2xl mx-auto"><div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">🚶 Virtual Pilgrim</h1><a href="index.html" class="bg-white/10 px-4 py-2 rounded-full text-sm">← Back</a></div>
<div class="bg-black/30 p-6 rounded-xl mb-4"><h2 class="text-xl font-bold mb-2">Way of St. James</h2><div class="w-full bg-gray-700 rounded-full h-4"><div class="bg-gold-light h-4 rounded-full" id="progressBar" style="width:0%"></div></div><p id="progressText" class="text-center mt-2">0 km completed of 800 km</p><p class="text-sm opacity-70 mt-4">⚡ Each 1 VBDC sent to DEUS = +10 km</p></div>
<div id="certificate" class="hidden bg-gold/10 p-4 rounded-xl text-center"><h3 class="text-2xl font-bold">🎉 You reached Santiago!</h3><p>Your Soulbound NFT certificate will appear here.</p></div></div>
<script>let pilgrim=JSON.parse(localStorage.getItem('pilgrim')||'{"km":0}');let km=pilgrim.km;let progress=Math.min(100,(km/800)*100);document.getElementById('progressBar').style.width=progress+'%';document.getElementById('progressText').innerHTML=`${km} km completed of 800 km`;if(km>=800){document.getElementById('certificate').classList.remove('hidden');let candles=JSON.parse(localStorage.getItem('candles')||'[]');let userWallet=localStorage.getItem('userWallet')||'';if(userWallet && !pilgrim.certGiven){pilgrim.certGiven=true;localStorage.setItem('pilgrim',JSON.stringify(pilgrim));}}function checkProgress(){let candles=JSON.parse(localStorage.getItem('candles')||'[]');let forGod=candles.filter(c=>c.action==='forGod'||c.action==='eternal');let newKm=forGod.length*10;if(newKm>km){km=newKm;pilgrim.km=km;localStorage.setItem('pilgrim',JSON.stringify(pilgrim));location.reload();}}checkProgress();</script></body></html>
