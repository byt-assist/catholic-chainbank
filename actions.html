<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40 Spiritual Deeds · Vatican Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js"></script>
    <style>
        body{background:linear-gradient(135deg,#2B2B2B 0%,#1A1A1A 100%);color:#F5F0E8;font-family:'Inter',sans-serif;}
        .glass{background:rgba(43,43,43,0.85);backdrop-filter:blur(12px);border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid rgba(197,160,89,0.4);}
        .btn-primary{background:linear-gradient(90deg,#8B6914,#C5A059,#FFDF85);color:#1A1A1A;padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;cursor:pointer;}
        .btn-secondary{background:rgba(197,160,89,0.15);border:1px solid rgba(197,160,89,0.4);padding:0.5rem 1.2rem;border-radius:40px;display:inline-block;cursor:pointer;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:1000;}
        .modal-content{background:#0B132B;border-radius:2rem;padding:1.5rem;max-width:500px;width:90%;border:1px solid #C5A059;}
        .address-box{background:#00000066;padding:0.75rem;border-radius:1rem;font-family:monospace;word-break:break-all;font-size:0.8rem;border:1px solid #FFDF85;margin:1rem 0;}
        .copy-btn{background:#C5A059;color:#1A1510;padding:0.3rem 0.8rem;border-radius:1rem;font-size:0.7rem;cursor:pointer;display:inline-block;}
    </style>
</head>
<body class="p-4">
<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold" data-i18n="actions_title">🙏 40 Spiritual Deeds</h1>
        <a href="index.html" class="btn-secondary" data-i18n="back">← Back to Home</a>
    </div>
    <div class="glass text-center mb-6">
        <p class="italic" data-i18n="actions_desc">Click on any deed → a window with the address and instructions will open → send tokens → paste TXID → get confirmation</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="actionsList"></div>
</div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" class="text-xl font-bold mb-2 text-gold-light"></h3>
        <p id="modalDesc" class="text-sm mb-3"></p>
        <div class="address-box" id="modalAddress"></div>
        <div class="flex gap-2 mb-3"><button id="copyAddressBtn" class="copy-btn" data-i18n="copy_addr">📋 Copy address</button></div>
        <p class="text-xs opacity-70 mb-2" data-i18n="after_send">After sending, paste TXID:</p>
        <input type="text" id="txidInput" class="w-full p-2 rounded bg-black/50 border border-gold/30 mb-2" data-i18n-placeholder="txid_placeholder">
        <button id="confirmActionBtn" class="btn-primary w-full py-2 rounded-full" data-i18n="confirm_btn">✅ Confirm</button>
        <div id="actionStatus" class="text-xs mt-2 text-center"></div>
        <button id="closeModalBtn" class="btn-secondary w-full mt-3 py-2 rounded-full" data-i18n="close">Close</button>
    </div>
</div>

<script>
const GOD_ADDRESS = "AXhysCBFq7JAoBxU7osLTj6wq9VjJxESiv5Z759ZfBmZ";
const DEMON_ADDRESS = "2zaWrMgqduTVfVRbnzPxuk4Sd9v5ifAsfVeSCkPgYYXj";

const deedKeys = Array.from({length: 40}, (_, i) => ({ id: i+1, nameKey: `deed${i+1}`, descKey: `deed${i+1}_desc` }));

let currentAction = null;
let userWallet = localStorage.getItem('userWallet') || '';

function renderActions() {
    const container = document.getElementById('actionsList');
    container.innerHTML = deedKeys.map(d => {
        const name = translations[currentLang]?.[d.nameKey] || d.nameKey;
        const desc = translations[currentLang]?.[d.descKey] || d.descKey;
        let address = GOD_ADDRESS;
        let token = "VBST";
        let amount = "1";
        if (d.id === 2 || d.id === 22 || d.id === 23 || d.id === 24 || d.id === 25) {
            token = "VBDC";
            amount = d.id === 24 ? "100" : (d.id === 25 ? "50" : "1");
        } else if (d.id === 14) { token = "VBDT"; amount = "100"; address = DEMON_ADDRESS; }
        else if (d.id === 15) { token = "VBDT"; amount = "1000"; address = DEMON_ADDRESS; }
        else if (d.id === 3) amount = "10";
        else if (d.id === 4) amount = "5";
        else if (d.id === 5) amount = "40";
        else if (d.id === 6) amount = "365";
        else if (d.id === 7) amount = "100";
        else if (d.id === 9 || d.id === 18) amount = "50";
        else if (d.id === 10) amount = "100";
        else if (d.id === 11) amount = "20";
        else if (d.id === 13) amount = "50";
        else if (d.id === 16) amount = "500";
        else if (d.id === 17) amount = "200";
        else if (d.id === 19) amount = "500";
        else if (d.id === 20) amount = "600";
        else if (d.id === 21) amount = "30";
        else if (d.id === 26) amount = "1";
        else if (d.id === 27) amount = "3";
        else if (d.id === 28) amount = "5";
        else if (d.id === 29) amount = "2";
        else if (d.id === 30) amount = "10";
        else if (d.id === 32) amount = "2";
        else if (d.id === 33) amount = "7";
        else if (d.id === 35) amount = "3";
        else if (d.id === 37) amount = "10";
        else if (d.id === 38) amount = "5";
        else if (d.id === 39) amount = "3";
        else if (d.id === 40) amount = "2";
        return `<div class="glass p-4"><div class="font-bold text-lg">${name}</div><div class="text-sm opacity-80 my-2">${desc}</div><div class="text-xs text-gold-light">💰 ${translations[currentLang]?.price || 'Price'}: ${amount} ${token}</div><button class="actionBtn mt-3 btn-primary w-full py-1 rounded-full text-sm" data-id="${d.id}" data-address="${address}" data-name="${name}" data-desc="${desc}" data-amount="${amount}" data-token="${token}">${translations[currentLang]?.select || 'Select'}</button></div>`;
    }).join('');
    
    document.querySelectorAll('.actionBtn').forEach(btn => {
        btn.onclick = () => {
            currentAction = {
                id: parseInt(btn.dataset.id),
                name: btn.dataset.name,
                desc: btn.dataset.desc,
                address: btn.dataset.address,
                amount: btn.dataset.amount,
                token: btn.dataset.token
            };
            document.getElementById('modalTitle').innerText = currentAction.name;
            document.getElementById('modalDesc').innerHTML = `<strong>📤 ${translations[currentLang]?.what_to_do || 'What to do'}:</strong> ${currentAction.desc}<br><strong>💰 ${translations[currentLang]?.amount || 'Amount'}:</strong> ${currentAction.amount} ${currentAction.token}`;
            document.getElementById('modalAddress').innerHTML = `<strong>📤 ${translations[currentLang]?.send_to || 'Send to address'}:</strong><br>${currentAction.address}`;
            document.getElementById('txidInput').value = '';
            document.getElementById('actionStatus').innerHTML = '';
            document.getElementById('actionModal').style.display = 'flex';
        };
    });
}

document.getElementById('copyAddressBtn').onclick = () => { if (currentAction) { navigator.clipboard.writeText(currentAction.address); alert('Address copied: ' + currentAction.address); } };
document.getElementById('confirmActionBtn').onclick = async () => { const txid = document.getElementById('txidInput').value.trim(); if (!txid) { alert('Enter TXID'); return; } if (!userWallet) { alert('First save your wallet on the main page'); return; } document.getElementById('actionStatus').innerHTML = '⏳ Verifying...'; try { const url = `https://public-api.solscan.io/transaction/${txid}`; const resp = await fetch(url); const data = await resp.json(); if (!data || !data.txId) throw new Error('Transaction not found'); const signer = data.signer?.[0] || data.accountKeys?.[0]; if (signer !== userWallet) throw new Error('TXID not from your wallet'); let completed = JSON.parse(localStorage.getItem('completedActions') || '[]'); completed.push({ actionId: currentAction.id, txid, date: new Date().toISOString() }); localStorage.setItem('completedActions', JSON.stringify(completed)); document.getElementById('actionStatus').innerHTML = '✅ ' + (translations[currentLang]?.deed_done || 'Deed counted!'); setTimeout(() => { document.getElementById('actionModal').style.display = 'none'; }, 1500); } catch (err) { document.getElementById('actionStatus').innerHTML = `❌ ${err.message}`; } };
document.getElementById('closeModalBtn').onclick = () => { document.getElementById('actionModal').style.display = 'none'; };
window.onclick = (e) => { if (e.target === document.getElementById('actionModal')) document.getElementById('actionModal').style.display = 'none'; };
renderActions();
</script>
</body>
</html>
